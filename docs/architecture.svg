  <text x="220" y="424" text-anchor="middle" font-size="11" fill="#4b5563">cross-log audit → report</text>
  <line x1="380" y1="314" x2="270" y2="376" stroke="#6b7280" stroke-width="1.6" marker-end="url(#ar)"/>

