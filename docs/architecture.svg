  <text x="390" y="250" text-anchor="middle" font-size="10.5" fill="#4b5563">Inquiry board</text>
  <text x="390" y="272" text-anchor="middle" font-size="10.5" fill="#4b5563">task state</text>
  <rect x="472" y="192" width="140" height="100" rx="8" fill="#ffffff" stroke="#ca8a04"/>
  <text x="542" y="214" text-anchor="middle" font-size="12" font-weight="600" fill="#111827">Obsidian vault</text>
