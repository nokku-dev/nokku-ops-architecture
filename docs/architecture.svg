  <text x="542" y="272" text-anchor="middle" font-size="10.5" fill="#4b5563">knowledge &amp; judgment</text>
  <line x1="220" y1="232" x2="296" y2="232" stroke="#6b7280" stroke-width="1.6" marker-end="url(#ar)"/>

