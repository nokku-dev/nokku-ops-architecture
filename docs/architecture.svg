  <text x="470" y="54" text-anchor="middle" font-size="12" fill="#6b7280">launchd-resident agents on Mac mini · GitHub Projects + Obsidian as substrate · human-in-the-loop weekly ops</text>

  <rect x="40" y="90" width="180" height="64" rx="10" fill="#f3f4f6" stroke="#9ca3af"/>
