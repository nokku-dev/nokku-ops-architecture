  <text x="500" y="434" text-anchor="middle" font-size="11" fill="#4b5563">adopts / promotes / decides</text>
  <line x1="324" y1="412" x2="376" y2="412" stroke="#6b7280" stroke-width="1.6" marker-end="url(#ar)"/>
  <path d="M560 380 C 590 340, 600 340, 615 318" fill="none" stroke="#6b7280" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <text x="640" y="352" text-anchor="middle" font-size="10" fill="#6b7280">manual / kernel PRs</text>

  <rect x="700" y="380" width="200" height="64" rx="10" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="800" y="406" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">Briefer (daily)</text>
  <text x="800" y="424" text-anchor="middle" font-size="11" fill="#4b5563">tasks · calendar · policy → Slack</text>
  <line x1="624" y1="412" x2="696" y2="412" stroke="#6b7280" stroke-width="1.6" marker-end="url(#ar)"/>

  <rect x="120" y="500" width="780" height="72" rx="12" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="510" y="528" text-anchor="middle" font-size="12.5" font-weight="600" fill="#111827">Planning cascade — long-term goals stay connected to daily execution</text>
  <text x="510" y="552" text-anchor="middle" font-size="12" fill="#374151">3-year plan (leading indicators) → quarterly milestones → weekly policy → daily brief</text>
  <line x1="500" y1="444" x2="500" y2="496" stroke="#6b7280" stroke-width="1.6" marker-end="url(#ar)"/>
